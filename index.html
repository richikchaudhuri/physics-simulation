<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physics Sandbox</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <canvas id="scene"></canvas>

    <div id="ui">
      <div class="panel">
        <div class="panel__head">
          <h1>Physics Sandbox</h1>
          <p class="sub">Rust &middot; WebAssembly &middot; Three.js</p>
        </div>
        <div class="panel__body">
          <div class="row"><span>Bodies</span><span id="stat-count">&mdash;</span></div>
          <div class="row"><span>FPS</span><span id="stat-fps">&mdash;</span></div>
          <div class="control">
            <label for="count-slider">Balls <span id="count-label">200</span></label>
            <input id="count-slider" type="range" min="2" max="1000" step="1" value="200" />
          </div>
          <button id="btn-reset" class="btn">Reset</button>
        </div>
      </div>

      <div class="hint">Drag a ball to grab &amp; throw &middot; left-drag empty space to orbit &middot; scroll to zoom</div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
